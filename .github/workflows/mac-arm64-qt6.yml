name: macOS-arm64-qt6

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      vt_ver:
        description: "VESC Tool branch/tag"
        required: true
        default: "qt6-port"
        type: string
      fw_ver:
        description: "Firmware Version"
        required: true
        default: "master"
        type: string
      release_notes:
        description: "Release Notes"
        required: false
        default: ""
        type: string
      prerelease:
        description: "Release as Prerelease"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Clone Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.vt_ver }}
          fetch-depth: 0
          fetch-tags: true
      - name: Checkout Workflow Scripts
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          path: .workflow-src
      - name: Setup
        env:
          ACTIONS_ALLOW_UNSECURE_COMMANDS: 'true'
          CUSTOM_RELEASE_NOTES: ${{ inputs.release_notes }}
        id: GetVersion
        run: |
          # The Qt6 branch removed vesc_tool.pro; read VT_VERSION from CMakeLists.txt.
          VT_VERSION=$(grep -m1 'set(VT_VERSION' CMakeLists.txt | sed 's/.*set(VT_VERSION //; s/).*//')
          echo "VERSION=${VT_VERSION}" >> $GITHUB_OUTPUT
          echo "PACKAGE_VERSION=${VT_VERSION}" >> $GITHUB_ENV
          export VT_VERSION
          export VT_REF="${{ inputs.vt_ver }}"
          export PRERELEASE="${{ inputs.prerelease }}"
          bash .workflow-src/.github/scripts/generate_release_notes.sh
        shell: bash
      - name: Select Xcode
        # Pin to 16.4 — newer Xcodes (26+) on macos-15 runners have removed
        # AGL.framework from their SDK, but Qt 6.8.3 still emits `-framework AGL`
        # in many .prl files and FindWrapOpenGL.cmake. 16.4 retains AGL.
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'
      - name: Install Qt 6.8.3 (macOS desktop)
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.3
          host: mac
          target: desktop
          arch: clang_64
          modules: qt5compat qtconnectivity qtserialport qtpositioning qt3d qtquick3d qtshadertools qtimageformats
          cache: 'true'
          cache-key-prefix: install-qt-action-qt6
      - name: Create TMP Dir
        id: mktemp
        run: echo "FW_TMP_DIR=$(mktemp -d)" >> $GITHUB_ENV
        shell: bash
      - name: Download FW Artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          name: firmware-${{ inputs.fw_ver }}
          path: ${{ env.FW_TMP_DIR }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repo: darwinbeing/bldc
          workflow: firmware.yml
          workflow_conclusion: success
          search_artifacts: true
      - name: Install Ninja
        run: brew install ninja
      - name: Install SDL3
        # macos-15 runners are Apple Silicon; build SDL3 for arm64 so it
        # links/bundles for the arm64 target.
        run: |
          set -e
          SDL3_VER=3.2.10
          curl -fLs -o /tmp/sdl3.tar.gz https://github.com/libsdl-org/SDL/releases/download/release-${SDL3_VER}/SDL3-${SDL3_VER}.tar.gz
          tar -xzf /tmp/sdl3.tar.gz -C /tmp
          cmake -S /tmp/SDL3-${SDL3_VER} -B /tmp/sdl3-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DCMAKE_OSX_ARCHITECTURES=arm64
          cmake --build /tmp/sdl3-build --parallel
          sudo cmake --install /tmp/sdl3-build
      - name: Configure
        run: |
          mkdir -p res/firmwares
          cp -rv "${{ env.FW_TMP_DIR }}"/* res/firmwares/
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64
      - name: Build
        # qrc_res.cpp compilation is memory-heavy and OOMs/swap-thrashes the
        # 7 GB macos-15 runner under unrestricted parallelism — cap to 2 jobs.
        run: cmake --build build --parallel 2
      - name: Package DMG
        run: |
          APP="build/VESC Tool.app"
          BIN="$APP/Contents/MacOS/VESC Tool"
          # Bundle the SDL3 dylib and repoint the binary at it BEFORE macdeployqt
          # (macdeployqt then relocates/signs the copy under Frameworks).
          mkdir -p "$APP/Contents/Frameworks"
          SDL3_DYLIB=$(ls /usr/local/lib/libSDL3.*.dylib | head -1)
          SDL3_BASE=$(basename "$SDL3_DYLIB")
          cp -L "$SDL3_DYLIB" "$APP/Contents/Frameworks/"
          OLD_REF=$(otool -L "$BIN" | awk '/libSDL3/{print $1; exit}')
          if [ -n "$OLD_REF" ]; then
            install_name_tool -change "$OLD_REF" "@executable_path/../Frameworks/$SDL3_BASE" "$BIN"
          fi
          "$QT_ROOT_DIR/bin/macdeployqt" "$APP" -qmldir=mobile
          # Drag-to-install layout: app + /Applications symlink (matches the Qt5 DMGs).
          STAGE=dmgroot
          rm -rf "$STAGE"; mkdir -p "$STAGE"
          cp -R "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "VESC Tool" -srcfolder "$STAGE" -ov -format UDZO -fs HFS+ \
            -o "VESC_Tool-${PACKAGE_VERSION}-mac-arm64-qt6.dmg"
      - name: Upload Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: VESC_Tool-${{ steps.GetVersion.outputs.VERSION }}-mac-arm64-qt6.dmg
          asset_name: VESC_Tool-${{ steps.GetVersion.outputs.VERSION }}-mac-arm64-qt6.dmg
          tag: ${{ steps.GetVersion.outputs.VERSION }}
          release_name: Release ${{ steps.GetVersion.outputs.VERSION }}
          overwrite: true
          prerelease: ${{ inputs.prerelease }}
