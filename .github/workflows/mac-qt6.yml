name: macOS-x86_64-qt6

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      vt_ver:
        description: "VESC Tool branch/tag"
        required: true
        default: "qt6-port"
        type: string
      fw_ver:
        description: "Firmware Version"
        required: true
        default: "master"
        type: string
      release_notes:
        description: "Release Notes"
        required: false
        default: ""
        type: string
      prerelease:
        description: "Release as Prerelease"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Clone Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.vt_ver }}
          fetch-depth: 0
          fetch-tags: true
      - name: Checkout Workflow Scripts
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          path: .workflow-src
      - name: Setup
        env:
          ACTIONS_ALLOW_UNSECURE_COMMANDS: 'true'
          CUSTOM_RELEASE_NOTES: ${{ inputs.release_notes }}
        id: GetVersion
        run: |
          # The Qt6 branch removed vesc_tool.pro; read VT_VERSION from CMakeLists.txt.
          VT_VERSION=$(grep -m1 'set(VT_VERSION' CMakeLists.txt | sed 's/.*set(VT_VERSION //; s/).*//')
          echo "VERSION=${VT_VERSION}" >> $GITHUB_OUTPUT
          echo "PACKAGE_VERSION=${VT_VERSION}" >> $GITHUB_ENV
          export VT_VERSION
          export VT_REF="${{ inputs.vt_ver }}"
          export PRERELEASE="${{ inputs.prerelease }}"
          bash .workflow-src/.github/scripts/generate_release_notes.sh
        shell: bash
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install Qt 6.8.3 (macOS desktop)
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.3
          host: mac
          target: desktop
          arch: clang_64
          modules: qt5compat qtconnectivity qtserialport qtpositioning qt3d qtquick3d qtshadertools qtimageformats
          cache: 'true'
          cache-key-prefix: install-qt-action-qt6
      - name: Patch Qt FindWrapOpenGL — drop dead AGL fallback
        # Qt 6.8.3's FindWrapOpenGL.cmake hardcodes `-framework AGL` as a
        # fallback when find_library(AGL) returns NOTFOUND. Xcode 14+ /
        # macOS 14+ SDKs removed AGL → link error on macos-15 runners.
        # AGL hasn't been needed by Qt for years; drop the dead string.
        run: |
          F="$QT_ROOT_DIR/lib/cmake/Qt6/FindWrapOpenGL.cmake"
          sed -i.bak 's/"-framework AGL"/""/' "$F"
          grep -n AGL "$F" || true
      - name: Create TMP Dir
        id: mktemp
        run: echo "FW_TMP_DIR=$(mktemp -d)" >> $GITHUB_ENV
        shell: bash
      - name: Download FW Artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          name: firmware-${{ inputs.fw_ver }}
          path: ${{ env.FW_TMP_DIR }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repo: darwinbeing/bldc
          workflow: firmware.yml
          workflow_conclusion: success
          search_artifacts: true
      - name: Install Ninja
        run: brew install ninja
      - name: Configure
        run: |
          mkdir -p res/firmwares
          cp -rv "${{ env.FW_TMP_DIR }}"/* res/firmwares/
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=x86_64
      - name: Build
        # qrc_res.cpp compilation is memory-heavy and OOMs/swap-thrashes the
        # 7 GB macos-15 runner under unrestricted parallelism — cap to 2 jobs.
        run: cmake --build build --parallel 2
      - name: Package DMG
        run: |
          "$QT_ROOT_DIR/bin/macdeployqt" "build/VESC Tool.app" -qmldir=mobile -dmg
          mv "build/VESC Tool.dmg" "VESC_Tool-${PACKAGE_VERSION}-mac-qt6.dmg"
      - name: Upload Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: VESC_Tool-${{ steps.GetVersion.outputs.VERSION }}-mac-qt6.dmg
          asset_name: VESC_Tool-${{ steps.GetVersion.outputs.VERSION }}-mac-qt6.dmg
          tag: ${{ steps.GetVersion.outputs.VERSION }}
          release_name: Release ${{ steps.GetVersion.outputs.VERSION }}
          overwrite: true
          prerelease: ${{ inputs.prerelease }}
