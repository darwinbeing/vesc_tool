name: CreateRelease

on:
  repository_dispatch:
    types: ["ForkSync"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      vt_ver:
        description: "VESC Tool Version"
        required: true
        default: "master"
        type: string
      fw_ver:
        description: "Firmware Version"
        required: true
        default: "master"
        type: string
      prerelease:
        description: "Release as Prerelease"
        required: true
        default: true
        type: boolean
      release_notes:
        description: "Release Notes"
        required: false
        default: ""
        type: string

jobs:
  build:
    runs-on: macos-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Version2Ref
        run: |
          if [[ "${{ inputs.vt_ver }}" =~ ^([0-9]+)\.([0-9]+)$ ]]; then
            echo "VT_REF=release_${BASH_REMATCH[1]}_${BASH_REMATCH[2]}" >> $GITHUB_ENV
          elif [[ "${{ inputs.vt_ver }}" == "master" ]]; then
            echo "VT_REF=master" >> $GITHUB_ENV
          else
            echo "VT_REF=${{ inputs.vt_ver }}" >> $GITHUB_ENV
          fi
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.VT_REF }}
      - name: Setup
        env:
          ACTIONS_ALLOW_UNSECURE_COMMANDS: 'true'
          CUSTOM_RELEASE_NOTES: ${{ inputs.release_notes }}
        id: GetVersion
        run: |
          VT_VERSION=$(grep -m1 VT_VERSION vesc_tool.pro  | awk -F= '{ print $2 }' | sed 's/[ ",]//g')
          echo "VERSION=${VT_VERSION}" >> $GITHUB_OUTPUT
          echo "PACKAGE_VERSION=${VT_VERSION}" >> $GITHUB_ENV
          if [ -n "${CUSTOM_RELEASE_NOTES}" ]; then
            {
              echo "RELEASE_NOTES<<EOF"
              echo "${CUSTOM_RELEASE_NOTES}"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          else
            CURRENT_TAG=""
            PREVIOUS_TAG=""
            if git rev-parse -q --verify "refs/tags/${VT_VERSION}" >/dev/null; then
              CURRENT_TAG="${VT_VERSION}"
            fi
            PREVIOUS_TAG=$(git tag --sort=-v:refname | grep -E '^[0-9]+\.[0-9]+$' | grep -Fxv "${VT_VERSION}" | head -n 1 || true)
            if [ "${{ inputs.prerelease }}" = "true" ]; then
              TITLE="**VESC Tool Nightly Build ${VT_VERSION}**"
              if [ -n "${CURRENT_TAG}" ]; then
                RANGE="${CURRENT_TAG}..HEAD"
              else
                RANGE="HEAD"
              fi
            else
              TITLE="**VESC Tool Release Build ${VT_VERSION}**"
              if [ -n "${PREVIOUS_TAG}" ] && [ -n "${CURRENT_TAG}" ]; then
                RANGE="${PREVIOUS_TAG}..${CURRENT_TAG}"
              elif [ -n "${PREVIOUS_TAG}" ]; then
                RANGE="${PREVIOUS_TAG}..HEAD"
              elif [ -n "${CURRENT_TAG}" ]; then
                RANGE="${CURRENT_TAG}"
              else
                RANGE="HEAD"
              fi
            fi
            FEATURES=""
            FIXES=""
            BUILD_CI=""
            OTHER=""
            while IFS= read -r entry; do
              [ -z "${entry}" ] && continue
              if echo "${entry}" | grep -Eiq '\b(fix|fixed|bug|issue|correct|resolve|resolved|warning|crash|regression)\b'; then
                FIXES="${FIXES}- ${entry}"$'\n'
              elif echo "${entry}" | grep -Eiq '\b(ci|build|workflow|release|packag|android|ios|macos|linux|windows|qt|xcode|sign|deploy)\b'; then
                BUILD_CI="${BUILD_CI}- ${entry}"$'\n'
              elif echo "${entry}" | grep -Eiq '\b(add|added|new|support|improv|feature|example|show|enable|update|updated)\b'; then
                FEATURES="${FEATURES}- ${entry}"$'\n'
              else
                OTHER="${OTHER}- ${entry}"$'\n'
              fi
            done < <(git log ${RANGE} --pretty=format:'%s (%h)' --no-merges --invert-grep --grep='has signed the CLA' || true)
            {
              echo "RELEASE_NOTES<<EOF"
              echo "${TITLE}"
              echo
              if [ -n "${FEATURES}" ]; then
                echo "### Features"
                printf '%s' "${FEATURES}"
                echo
              fi
              if [ -n "${FIXES}" ]; then
                echo "### Fixes"
                printf '%s' "${FIXES}"
                echo
              fi
              if [ -n "${BUILD_CI}" ]; then
                echo "### Build & CI"
                printf '%s' "${BUILD_CI}"
                echo
              fi
              if [ -n "${OTHER}" ]; then
                echo "### Other"
                printf '%s' "${OTHER}"
                echo
              fi
              if [ -z "${FEATURES}${FIXES}${BUILD_CI}${OTHER}" ]; then
                echo "- No commit summary available"
              else
                echo "_Generated from git commits in ${RANGE}_"
              fi
              echo "EOF"
            } >> $GITHUB_OUTPUT
          fi
      - name: Create TMP Dir
        id: mktemp
        run: echo "FW_TMP_DIR=$(mktemp -d)" >> $GITHUB_ENV
        shell: bash
      - name: Delete existing release and tag
        id: delete-tag-release
        uses: dev-drprasad/delete-tag-and-release@v1.1
        with:
          tag_name: ${{ steps.GetVersion.outputs.VERSION }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          delete_release: true
        continue-on-error: true
      # - name: CreateRelease
      #   id: create_release
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #   uses: actions/create-release@v1
      #   with:
      #     tag_name: ${{ steps.GetVersion.outputs.VERSION }}
      #     release_name: Release ${{ steps.GetVersion.outputs.VERSION }}
      #     body: ${{ github.event.head_commit.message }}
      #     draft: false
      #     prerelease: true
      #     commitish: ${{ env.VT_REF }}
      - name: Download FW Artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          name: firmware-${{ inputs.fw_ver }}
          path: ${{ env.FW_TMP_DIR }}
          github_token: ${{secrets.GITHUB_TOKEN}}
          repo: darwinbeing/bldc
          workflow: firmware.yml
          workflow_conclusion: success
          search_artifacts: true
          skip_unpack: true
      - name: Upload Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.GetVersion.outputs.VERSION }}
          release_name: Release ${{ steps.GetVersion.outputs.VERSION }}
          body: ${{ steps.GetVersion.outputs.RELEASE_NOTES }}
          file: ${{ env.FW_TMP_DIR }}/firmware-${{ inputs.fw_ver }}.zip
          asset_name: firmware-${{ inputs.fw_ver }}.zip
          overwrite: true
          prerelease: ${{ inputs.prerelease }}
          target_commit: ${{ env.VT_REF }}
      - name: Invoke workflow Windows
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: Windows
          token: ${{ secrets.GITHUB_TOKEN }}
          inputs: '{ "vt_ver": "${{ inputs.vt_ver }}", "fw_ver": "${{ inputs.fw_ver }}", "prerelease": "${{ inputs.prerelease }}", "release_notes": ${{ toJSON(inputs.release_notes) }} }'
      - name: Invoke workflow Linux
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: Linux
          token: ${{ secrets.GITHUB_TOKEN }}
          inputs: '{ "vt_ver": "${{ inputs.vt_ver }}", "fw_ver": "${{ inputs.fw_ver }}", "prerelease": "${{ inputs.prerelease }}", "release_notes": ${{ toJSON(inputs.release_notes) }} }'
      - name: Invoke workflow macOS x86_64
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: macOS-x86_64
          token: ${{ secrets.GITHUB_TOKEN }}
          inputs: '{ "vt_ver": "${{ inputs.vt_ver }}", "fw_ver": "${{ inputs.fw_ver }}", "os_ver": "macos-15", "xcode_ver": "16.4", "prerelease": "${{ inputs.prerelease }}", "release_notes": ${{ toJSON(inputs.release_notes) }} }'
      - name: Invoke workflow macOS arm64
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: macOS-arm64
          token: ${{ secrets.GITHUB_TOKEN }}
          inputs: '{ "vt_ver": "${{ inputs.vt_ver }}", "fw_ver": "${{ inputs.fw_ver }}", "os_ver": "macos-14", "xcode_ver": "15.1", "prerelease": "${{ inputs.prerelease }}", "release_notes": ${{ toJSON(inputs.release_notes) }} }'
      - name: Invoke workflow macOS universal
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: macOS-universal
          token: ${{ secrets.GITHUB_TOKEN }}
          inputs: '{ "vt_ver": "${{ inputs.vt_ver }}", "fw_ver": "${{ inputs.fw_ver }}", "os_ver": "macos-14", "xcode_ver": "15.1", "prerelease": "${{ inputs.prerelease }}", "release_notes": ${{ toJSON(inputs.release_notes) }} }'
      - name: Invoke workflow Android
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: Android
          token: ${{ secrets.GITHUB_TOKEN }}
          inputs: '{ "vt_ver": "${{ inputs.vt_ver }}", "fw_ver": "${{ inputs.fw_ver }}", "prerelease": "${{ inputs.prerelease }}", "release_notes": ${{ toJSON(inputs.release_notes) }} }'
      # - name: Invoke workflow Android2
      #   uses: benc-uk/workflow-dispatch@v1
      #   with:
      #     workflow: Android2
      #     token: ${{ secrets.GITHUB_TOKEN }}
      #     inputs: '{ "vt_ver": "${{ inputs.vt_ver }}", "fw_ver": "${{ inputs.fw_ver }}", "prerelease": "${{ inputs.prerelease }}", "release_notes": ${{ toJSON(inputs.release_notes) }} }'
      - name: Invoke workflow iOS
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: iOS
          token: ${{ secrets.GITHUB_TOKEN }}
          inputs: '{ "vt_ver": "${{ inputs.vt_ver }}", "fw_ver": "${{ inputs.fw_ver }}", "prerelease": "${{ inputs.prerelease }}", "release_notes": ${{ toJSON(inputs.release_notes) }} }'
