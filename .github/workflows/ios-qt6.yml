name: iOS-qt6

on:
  workflow_dispatch:
    inputs:
      vt_ver:
        description: "VESC Tool branch/tag"
        required: true
        default: "qt6-port"
        type: string
      fw_ver:
        description: "Firmware Version"
        required: true
        default: "master"
        type: string
      release_notes:
        description: "Release Notes"
        required: false
        default: ""
        type: string
      prerelease:
        description: "Release as Prerelease"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Clone Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.vt_ver }}
          fetch-depth: 0
          fetch-tags: true
      - name: Checkout Workflow Scripts
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          path: .workflow-src
      - name: Setup
        env:
          ACTIONS_ALLOW_UNSECURE_COMMANDS: 'true'
          CUSTOM_RELEASE_NOTES: ${{ inputs.release_notes }}
        id: GetVersion
        shell: bash
        run: |
          VT_VERSION=$(grep -m1 'set(VT_VERSION' CMakeLists.txt | sed 's/.*set(VT_VERSION //; s/).*//')
          echo "VERSION=${VT_VERSION}" >> $GITHUB_OUTPUT
          echo "PACKAGE_VERSION=${VT_VERSION}" >> $GITHUB_ENV
          export VT_VERSION
          export VT_REF="${{ inputs.vt_ver }}"
          export PRERELEASE="${{ inputs.prerelease }}"
          bash .workflow-src/.github/scripts/generate_release_notes.sh
      - name: Select Xcode
        # Pin to 16.4 — newer Xcodes (26+) on macos-15 removed AGL.framework
        # which Qt 6.8.3 still references via .prl/FindWrapOpenGL.
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'
      - name: Install Qt 6.8.3 (host macOS desktop)
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.3
          host: mac
          target: desktop
          arch: clang_64
          modules: qt5compat qtconnectivity qtserialport qtpositioning qt3d qtquick3d qtshadertools qtimageformats
          cache: 'true'
          cache-key-prefix: install-qt-action-qt6
      - name: Capture host Qt path
        run: echo "QT_HOST_PATH=$QT_ROOT_DIR" >> "$GITHUB_ENV"
      - name: Install Qt 6.8.3 (iOS)
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.3
          host: mac
          target: ios
          arch: ios
          modules: qt5compat qtconnectivity qtpositioning qt3d qtquick3d qtshadertools qtimageformats
          cache: 'true'
          cache-key-prefix: install-qt-action-qt6-ios
      - name: Create TMP Dir
        id: mktemp
        shell: bash
        run: echo "FW_TMP_DIR=$(mktemp -d)" >> $GITHUB_ENV
      - name: Download FW Artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          name: firmware-${{ inputs.fw_ver }}
          path: ${{ env.FW_TMP_DIR }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repo: darwinbeing/bldc
          workflow: firmware.yml
          workflow_conclusion: success
          search_artifacts: true
      - name: Configure
        run: |
          mkdir -p res/firmwares
          cp -rv "${FW_TMP_DIR}"/* res/firmwares/ || true
          cmake -S . -B build -G Xcode \
            -DCMAKE_TOOLCHAIN_FILE=$QT_ROOT_DIR/lib/cmake/Qt6/qt.toolchain.cmake \
            -DQT_HOST_PATH=$QT_HOST_PATH \
            -DCMAKE_BUILD_TYPE=Release
      - name: Build (unsigned device, matches the Qt5 iOS artifact)
        run: >
          cmake --build build --config Release --
          -sdk iphoneos -arch arm64
          CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
      - name: Package .app -> .zip
        run: |
          APP="build/Release-iphoneos/VESC Tool.app"
          test -d "$APP"
          ditto -c -k --sequesterRsrc --keepParent "$APP" \
            "VESC_Tool-ios-Qt6.zip"
      - name: Upload Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: VESC_Tool-ios-Qt6.zip
          asset_name: VESC_Tool-ios-Qt6.zip
          tag: ${{ steps.GetVersion.outputs.VERSION }}
          release_name: Release ${{ steps.GetVersion.outputs.VERSION }}
          body: ${{ steps.GetVersion.outputs.RELEASE_NOTES }}
          overwrite: true
          prerelease: ${{ inputs.prerelease }}
