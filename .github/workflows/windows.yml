name: Windows

on:
  push:
    tags:
       - '*'

jobs:
  Qt:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        qt: [5.12.7]
        os: [windows-2019]

    steps:
    - name: Clone repository
      uses: actions/checkout@v2
    - name: Install Qt
      uses: ouuan/install-qt-action@v2.3.1
      with:
        version: ${{ matrix.qt }}
        arch: win64_msvc2017_64
    - name: Install jom
      run: |
        Invoke-WebRequest http://download.qt.io/official_releases/jom/jom.zip -OutFile .\jom.zip
        expand-archive -path "jom.zip" -destinationpath "$HOME\jom"
        echo "::add-path::$HOME\jom"
    - name: Configure and compile
      run: .\build_win4CI.ps1
      shell: powershell
    # - name: Upload Artifacts
    #   uses: actions/upload-artifact@v1
    #   with:
    #     name: vesc_tool-win
    #     path: build\win
    - name: uploadRelease
      if: startsWith(github.event.ref, 'refs/tags/')
      id: uploadRelease
      env:
        GITHUB_TOKEN: ${{ secrets.VT_CR_TOKEN }}
      uses: darwinbeing/upload-release-asset@master
      with:
        tag_name: ${{ github.event.ref }}
        asset_path: .\build\win\vesc_tool_platinum-win.zip
        asset_name: vesc_tool-win.zip
        asset_content_type: application/zip