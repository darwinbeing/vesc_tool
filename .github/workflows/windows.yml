name: Windows

on:
  release:
    types: [published, edited]

jobs:
  Qt:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        qt: [5.13.2]
        os: [windows-2016]

    steps:
    - name: Clone repository
      uses: actions/checkout@v2
    - name: Install Qt
      uses: jurplel/install-qt-action@v2
      with:
        version: ${{ matrix.qt }}
        arch: win64_msvc2017_64
    - name: Install jom
      run: |
        Invoke-WebRequest http://download.qt.io/official_releases/jom/jom.zip -OutFile .\jom.zip
        expand-archive -path "jom.zip" -destinationpath "$HOME\jom"
        echo "::add-path::$HOME\jom"
    - name: Configure and compile
      run: .\build_win4CI.ps1
      shell: powershell
    # - name: Upload Artifacts
    #   uses: actions/upload-artifact@v1
    #   with:
    #     name: vesc_tool-win
    #     path: build\win
    - name: getLatestTagRelease
      shell: pwsh
      env:
        githubFullName: ${{ github.event.repository.full_name }}
        ref: ${{ github.event.ref }}
      run: |
        [string]$tag = ${env:ref}.Substring(${env:ref}.LastIndexOf('/') + 1)
        [string]$url = 'https://api.github.com/repos/' + ${env:githubFullName} + '/releases/tags/' + ${tag}
        $response = Invoke-RestMethod -Uri $url -Method Get
        [string]$latestUpUrl = $response.upload_url
        Write-Host 'latestUpUrl:'$latestUpUrl
        echo "::set-env name=uploadUrl::$latestUpUrl"
        Write-Host 'env uploadUrl:'${env:uploadUrl}
    - name: uploadRelease
      id: uploadRelease
      env:
        GITHUB_TOKEN: ${{ secrets.VT_CR_TOKEN }}
      uses: actions/upload-release-asset@v1.0.1
      with:
        upload_url: ${{ env.uploadUrl }}
        asset_path: .\build\win\vesc_tool_platinum-win.zip
        asset_name: vesc_tool-win.zip
        asset_content_type: application/zip