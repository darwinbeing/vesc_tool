name: Validate Patches

on:
  pull_request:
    paths:
      - 'patches/**'
  push:
    branches:
      - ci
    paths:
      - 'patches/**'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        version: ["master", "7.00"]
    steps:
      - name: Checkout CI repo
        uses: actions/checkout@v4
        with:
          path: ci-repo

      - name: Resolve upstream ref
        id: ref
        run: |
          v="${{ matrix.version }}"
          if [[ "$v" == "master" ]]; then
            echo "REF=master" >> "$GITHUB_OUTPUT"
          elif [[ "$v" =~ ^([0-9]+)\.([0-9]+)$ ]]; then
            echo "REF=release_${BASH_REMATCH[1]}_${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
          else
            echo "Unrecognized version: $v" >&2
            exit 1
          fi
        shell: bash

      # master / release_X_Y are fork-local copies of upstream, synced by upstream-sync.yaml
      - name: Checkout upstream source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.REF }}
          path: src

      - name: git apply --check
        run: |
          patch="ci-repo/patches/${{ matrix.version }}/vesc_tool.patch"
          if [[ ! -f "$patch" ]]; then
            echo "Patch not found: $patch" >&2
            exit 1
          fi
          cd src
          git apply --check --verbose "../$patch"
        shell: bash
