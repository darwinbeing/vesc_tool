name: macOS

on: push

jobs:
  Qt:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        qt: [5.13.2]
        os: [macos-latest]

    steps:
    - name: Clone repository
      uses: actions/checkout@v2
    - name: Install Qt (macOS)
      uses: jurplel/install-qt-action@v2
      with:
        version: ${{ matrix.qt }}
    - name: Configure and compile
      run: ./build_macos
    # - name: Upload Artifacts
    #   uses: actions/upload-artifact@v1
    #   with:
    #     name: vesc_tool-macOS
    #     path: build/macos   
    - name: getLatestTagRelease
      if: startsWith(github.event.ref, 'refs/tags/')
      shell: pwsh
      env:
        githubFullName: ${{ github.event.repository.full_name }}
        ref: ${{ github.event.ref }}
      run: |

        [string]$tag = ${env:ref}.Substring(${env:ref}.LastIndexOf('/') + 1)
        [string]$url = 'https://api.github.com/repos/' + ${env:githubFullName} + '/releases/tags/' + ${tag}
        $response = Invoke-RestMethod -Uri $url -Headers @{  "Authorization" = "Bearer ${secrets.CR_TOKEN}" } -Method Get
        [string]$latestUpUrl = $response.upload_url
        Write-Host 'latestUpUrl:'$latestUpUrl
        echo "::set-env name=uploadUrl::$latestUpUrl"
        Write-Host 'env uploadUrl:'${env:uploadUrl}
    - name: uploadRelease
      id: uploadRelease
      if: startsWith(github.event.ref, 'refs/tags/')
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      uses: actions/upload-release-asset@v1.0.1
      with:
        upload_url: ${{ env.uploadUrl }}
        asset_path: ./build/macos/vesc_tool_platinum-macOS.dmg
        asset_name: vesc_tool-macOS.dmg
        asset_content_type: application/applefile