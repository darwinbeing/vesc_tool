name: macOS-arm64

on:
  # workflow_run:
  #   workflows: ["CreateRelease"]
  #   types:
  #     - completed

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      vt_ver:
        description: "VESC Tool Version"
        required: true
        default: "master"
        type: string
      fw_ver:
        description: "Firmware Version"
        required: true
        default: "master"
        type: string
      os_ver:
        description: "macOS Version"
        required: true
        default: "macos-14"
        type: string
      xcode_ver:
        description: "Xcode Version"
        required: true
        default: "15.1"
        type: string
      release_notes:
        description: "Release Notes"
        required: false
        default: ""
        type: string
      prerelease:
        description: "Release as Prerelease"
        required: true
        default: true
        type: boolean

jobs:
  notify:
    runs-on: ${{ matrix.os }}
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        qt: [5.15.18]
        os: ["${{ inputs.os_ver }}"]
    steps:
      - name: Version2Ref
        run: |
          if [[ "${{ inputs.vt_ver }}" =~ ^([0-9]+)\.([0-9]+)$ ]]; then
            echo "VT_REF=release_${BASH_REMATCH[1]}_${BASH_REMATCH[2]}" >> $GITHUB_ENV
          elif [[ "${{ inputs.vt_ver }}" == "master" ]]; then
            echo "VT_REF=master" >> $GITHUB_ENV
          else
            echo "VT_REF=${{ inputs.vt_ver }}" >> $GITHUB_ENV
          fi
        shell: bash
      - name: Clone Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.VT_REF }}
          fetch-depth: 0
          fetch-tags: true
      - name: Create Directories
        run: |
          mkdir -p ${{ runner.temp }}/qt
      - name: Setup
        env:
          ACTIONS_ALLOW_UNSECURE_COMMANDS: 'true'
          CUSTOM_RELEASE_NOTES: ${{ inputs.release_notes }}
        id: GetVersion
        run: |
          VT_VERSION=$(grep -m1 VT_VERSION vesc_tool.pro  | awk -F= '{ print $2 }' | sed 's/[ ",]//g')
          echo "VERSION=${VT_VERSION}" >> $GITHUB_OUTPUT
          echo "PACKAGE_VERSION=${VT_VERSION}" >> $GITHUB_ENV
          if [ -n "${CUSTOM_RELEASE_NOTES}" ]; then
            {
              echo "RELEASE_NOTES<<EOF"
              echo "${CUSTOM_RELEASE_NOTES}"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          else
            CURRENT_TAG=""
            PREVIOUS_TAG=""
            if git rev-parse -q --verify "refs/tags/${VT_VERSION}" >/dev/null; then
              CURRENT_TAG="${VT_VERSION}"
            fi
            PREVIOUS_TAG=$(git tag --sort=-v:refname | grep -E '^[0-9]+\.[0-9]+$' | grep -Fxv "${VT_VERSION}" | head -n 1 || true)
            if [ "${{ inputs.prerelease }}" = "true" ]; then
              TITLE="**VESC Tool Nightly Build ${VT_VERSION}**"
              if [ -n "${CURRENT_TAG}" ]; then
                RANGE="${CURRENT_TAG}..HEAD"
              else
                RANGE="HEAD"
              fi
            else
              TITLE="**VESC Tool Release Build ${VT_VERSION}**"
              if [ -n "${PREVIOUS_TAG}" ] && [ -n "${CURRENT_TAG}" ]; then
                RANGE="${PREVIOUS_TAG}..${CURRENT_TAG}"
              elif [ -n "${PREVIOUS_TAG}" ]; then
                RANGE="${PREVIOUS_TAG}..HEAD"
              elif [ -n "${CURRENT_TAG}" ]; then
                RANGE="${CURRENT_TAG}"
              else
                RANGE="HEAD"
              fi
            fi
            FEATURES=""
            FIXES=""
            BUILD_CI=""
            OTHER=""
            while IFS= read -r entry; do
              [ -z "${entry}" ] && continue
              if echo "${entry}" | grep -Eiq '\b(fix|fixed|bug|issue|correct|resolve|resolved|warning|crash|regression)\b'; then
                FIXES="${FIXES}- ${entry}"$'\n'
              elif echo "${entry}" | grep -Eiq '\b(ci|build|workflow|release|packag|android|ios|macos|linux|windows|qt|xcode|sign|deploy)\b'; then
                BUILD_CI="${BUILD_CI}- ${entry}"$'\n'
              elif echo "${entry}" | grep -Eiq '\b(add|added|new|support|improv|feature|example|show|enable|update|updated)\b'; then
                FEATURES="${FEATURES}- ${entry}"$'\n'
              else
                OTHER="${OTHER}- ${entry}"$'\n'
              fi
            done < <(git log ${RANGE} --pretty=format:'%s (%h)' --no-merges --invert-grep --grep='has signed the CLA' || true)
            {
              echo "RELEASE_NOTES<<EOF"
              echo "${TITLE}"
              echo
              if [ -n "${FEATURES}" ]; then
                echo "### Features"
                printf '%s' "${FEATURES}"
                echo
              fi
              if [ -n "${FIXES}" ]; then
                echo "### Fixes"
                printf '%s' "${FIXES}"
                echo
              fi
              if [ -n "${BUILD_CI}" ]; then
                echo "### Build & CI"
                printf '%s' "${BUILD_CI}"
                echo
              fi
              if [ -n "${OTHER}" ]; then
                echo "### Other"
                printf '%s' "${OTHER}"
                echo
              fi
              if [ -z "${FEATURES}${FIXES}${BUILD_CI}${OTHER}" ]; then
                echo "- No commit summary available"
              else
                echo "_Generated from git commits in ${RANGE}_"
              fi
              echo "EOF"
            } >> $GITHUB_OUTPUT
          fi
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '${{ inputs.xcode_ver }}'
      - name: check Xcode version
        run: /usr/bin/xcodebuild -version
      # - name: Install Qt (macOS)
      #   uses: jurplel/install-qt-action@v4
      #   with:
      #     version: ${{ matrix.qt }}
      #     aqtversion: ==3.1.*
      #     host: mac
      #     target: desktop
      #     arch: clang_64
      #     setup-python: 'true'
      #     cache: 'true'
      #     cache-key-prefix: 'install-qt-action'
      - name: Get Release data of private repository
        id: release_data
        uses: KevinRohn/github-full-release-data@v2
        with:
          repository: "darwinbeing/qt5-macos-universal"
          token: ${{ secrets.GITHUB_TOKEN }}
          version: "1.0"
          asset-file: 'qt-5.15.18-macos-universal.tar.gz'
          asset-output: '${{ runner.temp }}/'
      - name: Extract Qt
        run: |
          tar -xzf ${{ runner.temp }}/qt-5.15.18-macos-universal.tar.gz -C ${{ runner.temp }}/
          echo "QT_ROOT=${{ runner.temp }}/Qt5.15.18/5.15.18/clang_64" >> $GITHUB_ENV
          echo "${{ runner.temp }}/Qt5.15.18/5.15.18/clang_64/bin" >> $GITHUB_PATH
      - name: Create TMP Dir
        id: mktemp
        run: echo "FW_TMP_DIR=$(mktemp -d)" >> $GITHUB_ENV
        shell: bash
      - name: Download FW Artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          name: firmware-${{ inputs.fw_ver }}
          path: ${{ env.FW_TMP_DIR }}
          github_token: ${{secrets.GITHUB_TOKEN}}
          repo: darwinbeing/bldc
          workflow: firmware.yml
          workflow_conclusion: success
          search_artifacts: true
      - name: Apply Patch
        run: |
          if [[ "${{ inputs.vt_ver }}" =~ ^([0-9]+)\.([0-9]+)$ ]]; then
              PATCH_VERSION="${{ inputs.vt_ver }}"
          elif [[ "${{ inputs.vt_ver }}" == "master" ]]; then
              PATCH_VERSION="master"
          else
              PATCH_VERSION=${{ env.PACKAGE_VERSION }}
          fi
          URL=https://raw.githubusercontent.com/darwinbeing/vesc_tool/ci/patches/"${PATCH_VERSION}"/vesc_tool.patch
          curl "$URL" -o ${{ runner.temp }}/vesc_tool.patch
          git apply "${{ runner.temp }}/vesc_tool.patch"
        shell: bash
      - name: Configure And Compile
        run: |
            mkdir -p res/firmwares
            cp -rv ${{ env.FW_TMP_DIR }}/* res/firmwares/
            chmod +x build_macos_arm64
            ./build_macos_arm64
      # - name: Upload Artifact
      #   uses: actions/upload-artifact@v3
      #   with:
      #     name: VESC_Tool-mac.dmg
      #     path: ./build/macos/VESC_Tool_platinum-macOS.dmg
      - name: Upload Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.GetVersion.outputs.VERSION }}
          release_name: Release ${{ steps.GetVersion.outputs.VERSION }}
          body: ${{ steps.GetVersion.outputs.RELEASE_NOTES }}
          file: ./build/macos/VESC_Tool_platinum-macOS-arm64.dmg
          asset_name: VESC_Tool-mac-arm64.dmg
          overwrite: true
          prerelease: ${{ inputs.prerelease }}
          target_commit: ${{ env.VT_REF }}
