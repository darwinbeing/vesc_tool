name: Build

on:
  push:
    branches: [qt6-port, master]
  pull_request:
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build \
            libgl1-mesa-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libbluetooth-dev '^libxcb.*-dev' libx11-xcb-dev \
            libglu1-mesa-dev libxrender-dev libxi-dev
      - name: Install Qt 6.8.3
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.3
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: qt5compat qtconnectivity qtserialport qtserialbus qtpositioning qt3d qtquick3d qtshadertools qtimageformats
      - name: Install SDL3
        run: |
          set -e
          SDL3_VER=3.2.10
          curl -fLs -o /tmp/sdl3.tar.gz https://github.com/libsdl-org/SDL/releases/download/release-${SDL3_VER}/SDL3-${SDL3_VER}.tar.gz
          tar -xzf /tmp/sdl3.tar.gz -C /tmp
          cmake -S /tmp/SDL3-${SDL3_VER} -B /tmp/sdl3-build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build /tmp/sdl3-build --parallel
          sudo cmake --install /tmp/sdl3-build
          sudo ldconfig
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --parallel

  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt 6.8.3
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.3
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qt5compat qtconnectivity qtserialport qtserialbus qtpositioning qt3d qtquick3d qtshadertools qtimageformats
      - name: Enable MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
      - name: Install SDL3
        shell: pwsh
        run: |
          $ver = "3.2.10"
          $url = "https://github.com/libsdl-org/SDL/releases/download/release-$ver/SDL3-devel-$ver-VC.zip"
          Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\sdl3.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP\sdl3.zip" -DestinationPath "$env:RUNNER_TEMP\sdl3" -Force
          echo "CMAKE_PREFIX_PATH=$env:RUNNER_TEMP\sdl3\SDL3-$ver" >> $env:GITHUB_ENV
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --parallel

  android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install Android NDK 26.1.10909125 (required by Qt 6.8)
        run: |
          set -e
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "ndk;26.1.10909125" "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> "$GITHUB_ENV"
      - name: Install Qt 6.8.3 (host - linux desktop, for androiddeployqt/qmlimportscanner)
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.3
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: qt5compat qtconnectivity qtserialport qtserialbus qtpositioning qt3d qtquick3d qtshadertools qtimageformats
      - name: Capture host Qt path
        run: echo "QT_HOST_PATH=$QT_ROOT_DIR" >> "$GITHUB_ENV"
      - name: Install Qt 6.8.3 (Android arm64)
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.3
          host: linux
          target: android
          arch: android_arm64_v8a
          modules: qt5compat qtconnectivity qtserialport qtserialbus qtpositioning qt3d qtquick3d qtshadertools qtimageformats
      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_TOOLCHAIN_FILE=$QT_ROOT_DIR/lib/cmake/Qt6/qt.toolchain.cmake
          -DQT_HOST_PATH=$QT_HOST_PATH
          -DCMAKE_BUILD_TYPE=Release
          -DANDROID_ABI=arm64-v8a
          -DANDROID_PLATFORM=android-23
          -DANDROID_SDK_ROOT=$ANDROID_SDK_ROOT
          -DANDROID_NDK=$ANDROID_NDK_ROOT
      - name: Build
        # Resource-heavy qrc_res compilation can OOM with unlimited parallelism
        # on the 16 GB ubuntu runner — cap to 2 jobs.
        run: cmake --build build --parallel 2

  ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install Qt 6.8.3 (host - macOS desktop, for tools)
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.3
          host: mac
          target: desktop
          arch: clang_64
          modules: qt5compat qtconnectivity qtserialport qtserialbus qtpositioning qt3d qtquick3d qtshadertools qtimageformats
      - name: Capture host Qt path
        run: echo "QT_HOST_PATH=$QT_ROOT_DIR" >> "$GITHUB_ENV"
      - name: Install Qt 6.8.3 (iOS)
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.3
          host: mac
          target: ios
          arch: ios
          modules: qt5compat qtconnectivity qtserialbus qtpositioning qt3d qtquick3d qtshadertools qtimageformats
      - name: Configure
        run: >
          cmake -S . -B build -G Xcode
          -DCMAKE_TOOLCHAIN_FILE=$QT_ROOT_DIR/lib/cmake/Qt6/qt.toolchain.cmake
          -DQT_HOST_PATH=$QT_HOST_PATH
          -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: >
          cmake --build build --config Release --
          -sdk iphonesimulator CODE_SIGNING_ALLOWED=NO
